# using - https://taskfile.dev/

version: "3"

vars:
  BINARY_NAME: gogoodwe
  APPPATH: ./cmd/gogoodwe/root/main.go
  PROJECT_NAME: gogoodwe
  # Cross-platform binary extension: .exe on Windows, empty on others
  EXE: '{{if eq OS "windows"}}.exe{{end}}'

###########################################################################

tasks:
  ## release - Builds the project in preparation for (local)release
  release:
    desc: "Builds a release binary with stripped symbols."
    deps: [lint]
    cmds:
      - go build -ldflags="-s -w" -o bin/{{.TARGET}} {{.APPPATH}}

  ###############################################################################

  ## goreleaser - Builds the project in preparation for release
  goreleaser:
    desc: "Builds a cross-platform snapshot release using goreleaser."
    cmds:
      - goreleaser release --snapshot --clean

  ###############################################################################

  ## build - Builds the project in preparation for debug
  build:
    desc: "Builds the project in preparation for debug."
    cmds:
      - go build -o bin/{{.BINARY_NAME}}{{.EXE}} {{.APPPATH}}

  ###############################################################################

  ## run - builds and runs the program on the target platform
  run:
    desc: "Builds and runs the program."
    cmds:
      - go run {{.APPPATH}}

  ###############################################################################

  ## clean - Remove the old builds and any debug information
  clean:
    desc: "Removes old builds, caches, and build artifacts."
    cmds:
      - go clean -cache
      - go clean
      - rm -rf dist bin

  ###############################################################################

  ## test - executes unit tests
  test:
    desc: "Runs all unit tests with verbose output."
    cmds:
      - go test -v ./...

  ###############################################################################

  ## test-coverage - runs tests with coverage report
  test-coverage:
    desc: "Runs tests and generates a coverage report."
    cmds:
      - go test -coverprofile=coverage.out ./internal/...
      - go tool cover -func=coverage.out

  ###############################################################################

  ## deps - fetches any external dependencies and updates
  deps:
    desc: "Tidies and downloads module dependencies."
    cmds:
      - go mod tidy
      - go mod download

  ###############################################################################

  ## vet - Vet examines Go source code and reports suspicious constructs
  vet:
    desc: "Examines Go source code and reports suspicious constructs."
    cmds:
      - go vet ./...

  ###############################################################################

  ## staticcheck - Runs static code analyzer staticcheck
  staticcheck:
    desc: "Runs the staticcheck static analyzer."
    cmds:
      - go run honnef.co/go/tools/cmd/staticcheck@latest ./...

  ###############################################################################

  ## seccheck - Code vulnerability check
  seccheck:
    desc: "Runs govulncheck for known vulnerabilities."
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  ###############################################################################

  ## lint - format code and tidy modules
  lint:
    desc: "Formats code and tidies modules."
    cmds:
      - go fmt ./...
      - go mod tidy -v
      - go fix ./...

  ###############################################################################

  ## generate - update build version
  generate:
    desc: "Runs go generate to update the embedded version."
    cmds:
      - go generate {{.APPPATH}}

  ###############################################################################
